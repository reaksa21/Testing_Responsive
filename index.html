<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #e5e7eb;

    }
    /* NavBar Control */
    .CtrlNavBar{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .Nav_logo{
        display: flex;
        align-items: center;
    }
    .Logo{
        background-color: #4f8df7;
        color: white;
        width: 40px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;
        font-weight: bold;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 20px;
    }
    a{
        text-decoration: none;
        color: blue;
        padding: 10px;
    }
    .CtrlA{
        font-size: larger;
        font-weight: bold;
        margin-right: 20px;
    }
    /* Card */
    .Container{
        background-color: white;
        width: 90%;
        margin: 40px auto;
        border-radius: 10px;
        padding: 10px;
    }
    p{
        color: #666;
    }
    label{
        color: #666;
    }
    input{
        box-sizing: border-box;
        border: 1px solid #ccc;
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-size: large;
    }
    /* .Ctrlbtn{
@media (max-width: 768px) {

        justify-content: center;

     </div>
